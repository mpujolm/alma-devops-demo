<template>
    <lightning-card>
        <h1 slot="title" class="slds-text-heading_medium">Nuevo Pedido — Alma Natural</h1>

        <!-- ── Spinner (se muestra durante cargas y guardado) ── -->
        <template lwc:if={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Cargando..." size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- ── Contenido (oculto mientras carga) ── -->
        <template lwc:else>

            <!-- ══════════════════════════════════════════════════════════════ -->
            <!-- PASO 1 — Selección de productos                               -->
            <!-- ══════════════════════════════════════════════════════════════ -->
            <template lwc:if={isStepSelection}>

                <!-- Barra de contacto -->
                <div class="contact-bar slds-m-horizontal_medium slds-m-top_small slds-m-bottom_medium">
                    <lightning-icon icon-name="standard:contact" size="x-small"
                        class="slds-m-right_x-small icon-align"></lightning-icon>
                    <span><strong>Contacto:&nbsp;</strong>{contactName}</span>
                </div>

                <!-- Error / advertencia -->
                <template lwc:if={errorMessage}>
                    <div class="slds-m-horizontal_medium slds-m-bottom_small">
                        <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                            <lightning-icon icon-name="utility:error" alternative-text="Error"
                                size="x-small" class="slds-m-right_x-small icon-align"></lightning-icon>
                            {errorMessage}
                        </div>
                    </div>
                </template>

                <!-- Buscador -->
                <div class="slds-m-horizontal_medium slds-m-bottom_small">
                    <lightning-input
                        type="search"
                        label="Buscar producto"
                        value={searchTerm}
                        onchange={handleSearchChange}>
                    </lightning-input>
                </div>

                <!-- Tabla de productos -->
                <div class="slds-m-horizontal_medium table-scroll">
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered
                                  slds-table_striped slds-table_col-bordered">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col">Producto</th>
                                <th scope="col" class="slds-text-align_right col-ml">Tamaño (ml)</th>
                                <th scope="col" class="slds-text-align_right col-price">Precio</th>
                                <th scope="col" class="slds-text-align_right col-stock">Stock</th>
                                <th scope="col" class="slds-text-align_center col-qty">Cantidad</th>
                                <th scope="col" class="slds-text-align_center col-btn"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={displayProducts} for:item="product">
                                <tr key={product.id}>
                                    <td data-label="Producto">{product.name}</td>
                                    <td data-label="Tamaño (ml)" class="slds-text-align_right">
                                        {product.quantityMl}
                                    </td>
                                    <td data-label="Precio" class="slds-text-align_right">
                                        <lightning-formatted-number
                                            value={product.price}
                                            format-style="currency"
                                            currency-code="EUR"
                                            maximum-fraction-digits="2">
                                        </lightning-formatted-number>
                                    </td>
                                    <td data-label="Stock" class="slds-text-align_right">
                                        {product.stock}
                                    </td>
                                    <td data-label="Cantidad" class="slds-text-align_center">
                                        <div class="qty-cell">
                                            <lightning-input
                                                type="number"
                                                label="Cantidad"
                                                variant="label-hidden"
                                                value={product.inputQuantity}
                                                min="1"
                                                step="1"
                                                data-productid={product.id}
                                                onchange={handleQuantityChange}>
                                            </lightning-input>
                                            <template lwc:if={product.stockWarning}>
                                                <p class="stock-warning slds-text-color_error
                                                           slds-text-body_small">
                                                    {product.stockWarningMessage}
                                                </p>
                                            </template>
                                        </div>
                                    </td>
                                    <td data-label="" class="slds-text-align_center">
                                        <lightning-button
                                            label="Agregar"
                                            variant="brand"
                                            data-productid={product.id}
                                            onclick={handleAddToCart}>
                                        </lightning-button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>

                <!-- ── Carrito ── -->
                <template lwc:if={hasCartLines}>
                    <div class="slds-m-horizontal_medium slds-m-top_large">
                        <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                            <h2 class="slds-text-heading_small">
                                <lightning-icon icon-name="utility:cart" size="x-small"
                                    class="slds-m-right_x-small icon-align"></lightning-icon>
                                Líneas del pedido ({cartCount})
                            </h2>
                        </div>

                        <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col">Producto</th>
                                    <th scope="col" class="slds-text-align_right col-qty-sm">Cant.</th>
                                    <th scope="col" class="slds-text-align_right col-price">Precio unit.</th>
                                    <th scope="col" class="slds-text-align_right col-price">Total línea</th>
                                    <th scope="col" class="col-del"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={cartLines} for:item="line">
                                    <tr key={line.productId}>
                                        <td>
                                            {line.productName}
                                            <template lwc:if={line.stockWarning}>
                                                <span class="slds-badge slds-badge_lightest
                                                             slds-m-left_x-small badge-warning">
                                                    ⚠ Stock bajo
                                                </span>
                                            </template>
                                        </td>
                                        <td class="slds-text-align_right">{line.quantity}</td>
                                        <td class="slds-text-align_right">
                                            <lightning-formatted-number
                                                value={line.unitPrice}
                                                format-style="currency"
                                                currency-code="EUR"
                                                maximum-fraction-digits="2">
                                            </lightning-formatted-number>
                                        </td>
                                        <td class="slds-text-align_right">
                                            <lightning-formatted-number
                                                value={line.lineTotal}
                                                format-style="currency"
                                                currency-code="EUR"
                                                maximum-fraction-digits="2">
                                            </lightning-formatted-number>
                                        </td>
                                        <td class="slds-text-align_center">
                                            <lightning-button-icon
                                                icon-name="utility:delete"
                                                alternative-text="Eliminar línea"
                                                variant="bare"
                                                data-productid={line.productId}
                                                onclick={handleRemoveFromCart}>
                                            </lightning-button-icon>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                            <tfoot>
                                <tr class="total-row">
                                    <td colspan="3" class="slds-text-align_right">
                                        <strong>Total pedido</strong>
                                    </td>
                                    <td class="slds-text-align_right">
                                        <strong>
                                            <lightning-formatted-number
                                                value={orderTotal}
                                                format-style="currency"
                                                currency-code="EUR"
                                                maximum-fraction-digits="2">
                                            </lightning-formatted-number>
                                        </strong>
                                    </td>
                                    <td></td>
                                </tr>
                            </tfoot>
                        </table>

                        <div class="slds-m-top_medium slds-text-align_right">
                            <lightning-button
                                label="Siguiente →"
                                variant="brand"
                                onclick={handleGoToConfirmation}>
                            </lightning-button>
                        </div>
                    </div>
                </template>

                <!-- Estado vacío (sin líneas en el carrito) -->
                <template lwc:else>
                    <div class="slds-m-around_medium slds-text-align_center slds-text-color_weak">
                        <p>Selecciona productos y pulsa «Agregar» para añadirlos al pedido.</p>
                    </div>
                </template>

            </template>
            <!-- /PASO 1 -->

            <!-- ══════════════════════════════════════════════════════════════ -->
            <!-- PASO 2 — Confirmación                                         -->
            <!-- ══════════════════════════════════════════════════════════════ -->
            <template lwc:if={isStepConfirmation}>
                <div class="slds-m-around_medium">
                    <h2 class="slds-text-heading_small slds-m-bottom_medium">Resumen del pedido</h2>

                    <div class="slds-box slds-box_x-small slds-theme_shade slds-m-bottom_medium">
                        <p><strong>Contacto:</strong>&nbsp;{contactName}</p>
                        <p><strong>Fecha:</strong>&nbsp;{todayFormatted}</p>
                        <p><strong>Estado inicial:</strong>&nbsp;Solicitado</p>
                    </div>

                    <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col">Producto</th>
                                <th scope="col" class="slds-text-align_right col-qty-sm">Cant.</th>
                                <th scope="col" class="slds-text-align_right col-price">Precio unit.</th>
                                <th scope="col" class="slds-text-align_right col-price">Total línea</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={cartLines} for:item="line">
                                <tr key={line.productId}>
                                    <td>{line.productName}</td>
                                    <td class="slds-text-align_right">{line.quantity}</td>
                                    <td class="slds-text-align_right">
                                        <lightning-formatted-number
                                            value={line.unitPrice}
                                            format-style="currency"
                                            currency-code="EUR"
                                            maximum-fraction-digits="2">
                                        </lightning-formatted-number>
                                    </td>
                                    <td class="slds-text-align_right">
                                        <lightning-formatted-number
                                            value={line.lineTotal}
                                            format-style="currency"
                                            currency-code="EUR"
                                            maximum-fraction-digits="2">
                                        </lightning-formatted-number>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                        <tfoot>
                            <tr class="total-row">
                                <td colspan="3" class="slds-text-align_right">
                                    <strong>Total pedido</strong>
                                </td>
                                <td class="slds-text-align_right">
                                    <strong>
                                        <lightning-formatted-number
                                            value={orderTotal}
                                            format-style="currency"
                                            currency-code="EUR"
                                            maximum-fraction-digits="2">
                                        </lightning-formatted-number>
                                    </strong>
                                </td>
                            </tr>
                        </tfoot>
                    </table>

                    <div class="slds-m-top_medium slds-grid slds-grid_align-spread">
                        <lightning-button
                            label="← Volver a editar"
                            onclick={handleBackToSelection}>
                        </lightning-button>
                        <lightning-button
                            label="Confirmar pedido"
                            variant="brand"
                            onclick={handleConfirmOrder}>
                        </lightning-button>
                    </div>
                </div>
            </template>
            <!-- /PASO 2 -->

            <!-- ══════════════════════════════════════════════════════════════ -->
            <!-- PASO 3 — Éxito                                                -->
            <!-- ══════════════════════════════════════════════════════════════ -->
            <template lwc:if={isStepSuccess}>
                <div class="success-container slds-m-around_large slds-text-align_center">
                    <lightning-icon
                        icon-name="action:approval"
                        size="large">
                    </lightning-icon>
                    <h2 class="slds-text-heading_medium slds-m-top_medium">
                        ¡Pedido creado con éxito!
                    </h2>
                    <p class="slds-text-body_regular slds-m-top_small slds-m-bottom_large">
                        Número de pedido: <strong>{orderNumber}</strong>
                    </p>
                    <lightning-button
                        label="Nuevo pedido"
                        variant="brand"
                        onclick={handleReset}>
                    </lightning-button>
                </div>
            </template>
            <!-- /PASO 3 -->

        </template>
        <!-- /lwc:else (contenido) -->

    </lightning-card>
</template>
